# general settings
name: VideoFusion
model_type: VideoFusionModel
scale: 1
num_gpu: 4  # set num_gpu: 0 for cpu mode
manual_seed: 3047

# dataset and data loader settings
datasets:
  train:
    name: M3SVD
    type: VideoFusionDataset
    dataroot_gt_vi: ./dataset/M3SVD/val/visible_Enhance
    dataroot_lq_vi: ./dataset/M3SVD/val/visible_Blur
    dataroot_gt_ir: ./dataset/M3SVD/val/infrared_Enhance
    dataroot_lq_ir: ./dataset/M3SVD/val/infrared_noise
    test_mode: False
    io_backend:
      type: disk
      
    num_frame: 6
    gt_size: 128
    interval_list: [1]
    random_reverse: false
    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 3
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: M3SVD
    type: VideoFusionTestDataset
    dataroot_gt_vi: ./dataset/M3SVD/val/visible_Enhance
    dataroot_lq_vi: ./dataset/M3SVD/val/visible_Blur
    dataroot_gt_ir: ./dataset/M3SVD/val/infrared_Enhance
    dataroot_lq_ir: ./dataset/M3SVD/val/infrared_noise
    cache_data: false
    io_backend:
      type: disk

    num_frame: 10
    num_overlap: 0

# network structures
network_g:
  type: VideoFusion_Trans
  in_channels: 3
  out_channels: 3
  num_features: 32
  num_blocks: [2, 2, 4]
  num_decoder_blocks: 2
  num_heads: [2, 4, 8]
  ffn_expansion_factor: 1
  bias: false
  LayerNorm_type: 'WithBias'   ## Other option 'BiasFree'
  embed_dim: 32
  groups: [4, 8, 16]

# path
path:
  pretrain_network_g: ~ # 
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: !!float 1e-5
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [500000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  total_epoch: 10
  warmup_iter: 5000  # no warm up

  # losses
  fusion_opt:
    type: Fusion_loss

  fidelity_opt:
    type: Fidelity_loss

  consistency_opt:
    type: TemporalConsistency_loss

# validation settings
val:
  val_freq: 5000
  flip_seq: false
  save_img: true

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: 5000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

find_unused_parameters: true
